<!DOCTYPE html>
<html>
<head>
  <title>Dileep Kumar Gali | AI Executive Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 { font-size: 40px; margin-bottom: 5px; }

    p.subtitle {
      color: #cbd5e1;
      margin-bottom: 30px;
      font-size: 18px;
    }

    h2 { margin-top: 40px; }

    .metrics-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .metric-card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .metric-card h3 {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .metric-card p {
      font-size: 26px;
      font-weight: bold;
      margin: 0;
    }

  </style>
</head>

<body>

  <h1>Dileep Kumar Gali</h1>
  <p class="subtitle">Senior Supply Chain & Defense Procurement Leader</p>

  <h2>Executive Impact Snapshot</h2>

  <div class="metrics-container">
    <div class="metric-card">
      <h3>Total Financial Impact</h3>
      <p id="totalImpact">Loading...</p>
    </div>

    <div class="metric-card">
      <h3>Portfolio Exposure</h3>
      <p id="portfolioExposure">Loading...</p>
    </div>

    <div class="metric-card">
      <h3>Performance Improvement</h3>
      <p id="performanceImprovement">Loading...</p>
    </div>
  </div>

<script>
async function loadMetrics() {
  try {
    const response = await fetch("https://dileep-ai-proxy.dileepscl.workers.dev");
    const data = await response.json();

    if (data.error) {
      document.getElementById("totalImpact").innerText = "Error";
      return;
    }

    document.getElementById("totalImpact").innerText =
      "$" + data.totalImpact.toLocaleString();

    document.getElementById("portfolioExposure").innerText =
      "$" + data.portfolioExposure.toLocaleString();

    document.getElementById("performanceImprovement").innerText =
      data.avgPerformanceImprovement + "%";

  } catch (error) {
    document.getElementById("totalImpact").innerText = "API Error";
  }
}

loadMetrics();
</script>

</body>
</html>
