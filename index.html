<!DOCTYPE html>
<html>
<head>
  <title>Dileep Kumar Gali | AI Executive Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 5px;
    }

    p.subtitle {
      color: #cbd5e1;
      margin-bottom: 30px;
      font-size: 18px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 10px;
    }

    .metrics-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .metric-card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
    }

    .metric-card:hover {
      transform: translateY(-5px);
    }

    .metric-card h3 {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .metric-card p {
      font-size: 26px;
      font-weight: bold;
      margin: 0;
    }

    .chat-container {
      max-width: 650px;
      margin: 0 auto;
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    input {
      width: 70%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-left: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .response {
      margin-top: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: #0b1220;
      padding: 15px;
      border-radius: 8px;
      min-height: 50px;
    }
  </style>
</head>

<body>

  <h1>Dileep Kumar Gali</h1>
  <p class="subtitle">Senior Supply Chain & Defense Procurement Leader</p>

  <h2>Executive Impact Snapshot</h2>

  <div class="metrics-container">

    <div class="metric-card">
      <h3>Total Financial Impact</h3>
      <p id="totalImpact">$0</p>
    </div>

    <div class="metric-card">
      <h3>Portfolio Exposure</h3>
      <p id="portfolioExposure">$0</p>
    </div>

    <div class="metric-card">
      <h3>Performance Improvement</h3>
      <p id="performanceImprovement">0%</p>
    </div>

  </div>

  <div class="chat-container">
    <h3>Ask Me Anything</h3>
    <input type="text" id="userInput" placeholder="Ask about leadership, sourcing, impact..." />
    <button onclick="sendMessage()">Ask</button>
    <div class="response" id="aiResponse"></div>
  </div>

<script src="metrics.js"></script>

<script>
  // Render Metrics from metrics.js
  document.getElementById("totalImpact").innerText =
    "$" + EXECUTIVE_METRICS.totalImpact.toLocaleString();

  document.getElementById("portfolioExposure").innerText =
    "$" + EXECUTIVE_METRICS.portfolioExposure.toLocaleString();

  document.getElementById("performanceImprovement").innerText =
    EXECUTIVE_METRICS.avgPerformanceImprovement + "%";

  // AI Chat Function
  async function sendMessage() {
    const userMessage = document.getElementById("userInput").value;
    const responseBox = document.getElementById("aiResponse");

    if (!userMessage) return;

    responseBox.innerHTML = "Thinking...";

    try {
      const response = await fetch(
        "https://dileep-ai-proxy.dileepscl.workers.dev",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: userMessage })
        }
      );

      const data = await response.json();
      responseBox.innerHTML = data.reply;

    } catch (error) {
      responseBox.innerHTML = "AI service unavailable.";
    }
  }
</script>

</body>
</html>
