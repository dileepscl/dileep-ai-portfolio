<!DOCTYPE html>
<html>
<head>
  <title>Dileep Kumar Gali | AI Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
    }

    .chat-container {
      max-width: 600px;
      margin: 40px auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .response {
      margin-top: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>Dileep Kumar Gali</h1>
  <p>Senior Supply Chain & Defense Procurement Leader</p>

  <div class="chat-container">
    <h3>Ask Me Anything</h3>
    <input type="text" id="userInput" placeholder="Ask about leadership, sourcing, impact..." />
    <button onclick="sendMessage()">Ask</button>
    <div class="response" id="aiResponse"></div>
  </div>

<script>
async function sendMessage() {
  const userMessage = document.getElementById("userInput").value;
  const responseBox = document.getElementById("aiResponse");

  if (!userMessage) return;

  responseBox.innerHTML = "Thinking...";

  try {
    const response = await fetch(
      "https://dileep-ai-proxy.dileepscl.workers.dev",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userMessage })
      }
    );

    const data = await response.json();
    responseBox.innerHTML = data.reply;

  } catch (error) {
    responseBox.innerHTML = "AI service unavailable.";
  }
}
</script>

</body>
</html>
