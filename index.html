<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dileep Kumar Gali | Executive Intelligence Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0f1a;
  --bg-card: #1a2332;
  --accent-gold: #d4a843;
  --accent-blue: #3b82f6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --border: #1e293b;
}

body {
  margin:0;
  font-family:'IBM Plex Sans', sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
}

section {
  padding:80px 10%;
}

h1,h2 {
  font-family:'Playfair Display', serif;
}

.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.metric-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

.card {
  background:var(--bg-card);
  padding:30px;
  border:1px solid var(--border);
  text-align:center;
}

.card h3 {
  font-family:'IBM Plex Mono';
  font-size:28px;
  color:var(--accent-gold);
}

.chat-widget {
  position:fixed;
  bottom:20px;
  right:20px;
  width:350px;
  height:500px;
  background:var(--bg-card);
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.chat-header {
  padding:15px;
  background:#111827;
  font-weight:bold;
  color:var(--accent-gold);
}

.chat-messages {
  flex:1;
  overflow-y:auto;
  padding:15px;
  font-size:14px;
}

.chat-input {
  display:flex;
}

.chat-input input {
  flex:1;
  padding:10px;
  background:#111827;
  border:none;
  color:white;
}

.chat-input button {
  padding:10px;
  background:var(--accent-blue);
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<section class="hero">
<h1>Dileep Kumar Gali</h1>
<h2>Global Supply Chain Executive</h2>

<div class="metric-grid">
<div class="card">
<h3>$25M+</h3>
<p>Commercial Impact Delivered</p>
</div>
<div class="card">
<h3>$40M+</h3>
<p>Defense Portfolio Managed</p>
</div>
<div class="card">
<h3>30%</h3>
<p>Cost Take-Out Achieved</p>
</div>
<div class="card">
<h3>6</h3>
<p>Professional Certifications</p>
</div>
</div>
</section>

<!-- AI CHATBOT -->
<div class="chat-widget">
<div class="chat-header">Executive Intelligence Advisor</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Ask about $25M impact, ITAR, VP readiness..." />
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("chatInput");
  const messages = document.getElementById("chatMessages");

  if (!input.value) return;

  const userText = input.value;
  messages.innerHTML += "<div><strong>You:</strong> " + userText + "</div>";
  input.value = "";

  const response = await fetch("https://dileep-ai-proxy.dileepscl.workers.dev", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ message:userText })
  });

  const data = await response.json();

  messages.innerHTML += "<div style='margin-top:10px;color:#d4a843'><strong>Advisor:</strong> " + data.response + "</div>";
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
