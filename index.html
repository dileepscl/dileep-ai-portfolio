<!DOCTYPE html>
<html>
<head>
  <title>Dileep Kumar Gali | AI Executive Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 5px;
    }

    p.subtitle {
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    h2 {
      margin-top: 40px;
    }

    .metrics-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .metric-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
    }

    .metric-card h3 {
      margin-bottom: 10px;
      font-size: 16px;
      color: #94a3b8;
    }

    .metric-card p {
      font-size: 22px;
      font-weight: bold;
      color: white;
    }

    .chat-container {
      max-width: 600px;
      margin: 50px auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 75%;
      padding: 12px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .response {
      margin-top: 20px;
      text-align: left;
      white-space: pre-wrap;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>Dileep Kumar Gali</h1>
  <p class="subtitle">Senior Supply Chain & Defense Procurement Leader</p>

  <h2>Executive Impact Snapshot</h2>

  <div class="metrics-container">

    <div class="metric-card">
      <h3>Total Financial Impact</h3>
      <p id="totalImpact">$0</p>
    </div>

    <div class="metric-card">
      <h3>Portfolio Exposure</h3>
      <p id="portfolioExposure">$0</p>
    </div>

    <div class="metric-card">
      <h3>Performance Improvement</h3>
      <p id="performanceImprovement">0%</p>
    </div>

  </div>

  <div class="chat-container">
    <h3>Ask Me Anything</h3>
    <input type="text" id="userInput" placeholder="Ask about leadership, sourcing, impact..." />
    <button onclick="sendMessage()">Ask</button>
    <div class="response" id="aiResponse"></div>
  </div>

<script>
async function sendMessage() {
  const userMessage = document.getElementById("userInput").value;
  const responseBox = document.getElementById("aiResponse");

  if (!userMessage) return;

  responseBox.innerHTML = "Thinking...";

  try {
    const response = await fetch(
      "https://dileep-ai-proxy.dileepscl.workers.dev",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userMessage })
      }
    );

    const data = await response.json();
    responseBox.innerHTML = data.reply;

  } catch (error) {
    responseBox.innerHTML = "AI service unavailable.";
  }
}
</script>

<script src="metrics.js"></script>

<script>
  // Render metrics dynamically
  document.getElementById("totalImpact").innerText =
    "$" + EXECUTIVE_METRICS.totalImpact.toLocaleString();

  document.getElementById("portfolioExposure").innerText =
    "$" + EXECUTIVE_METRICS.portfolioExposure.toLocaleString();

  document.getElementById("performanceImprovement").innerText =
    EXECUTIVE_METRICS.avgPerformanceImprovement + "%";
</script>

</body>
</html>
